<div class="oj-hybrid-padding">
  <h1>Stock</h1>

  <oj-toolbar id="stockToolbar" aria-label="Stock toolbar" class="oj-sm-margin-4x-bottom">
    <oj-button id="addItemButton" on-oj-action="[[openAddItemDialog]]">
      <span slot="startIcon" class="oj-ux-ico-plus"></span>
      Add Item
    </oj-button>
  </oj-toolbar>

  <div class="oj-flex oj-sm-align-items-flex-end oj-sm-margin-4x-bottom">
    <div class="oj-flex-item oj-sm-12 oj-md-6 oj-sm-padding-2x-end">
      <oj-input-text
        id="stockSearch"
        label-hint="Search stock"
        value="{{searchInput}}"
        on-raw-value-changed="[[handleSearchInputChanged]]"
        on-keydown="[[handleSearchKeydown]]"
        clear-icon="always"
        class="oj-sm-width-full">
      </oj-input-text>
    </div>
    <div class="oj-flex-item">
      <oj-button id="searchButton" on-oj-action="[[applySearch]]">
        <span slot="startIcon" class="oj-ux-ico-search"></span>
        Search
      </oj-button>
      <oj-button id="clearSearchButton" on-oj-action="[[clearSearch]]">
        Clear
      </oj-button>
    </div>
  </div>

  <oj-table
    id="stockTable"
    aria-label="Stock table"
    data="[[itemsDataProvider]]"
    columns="[[columns]]"
    display="grid"
    class="oj-sm-width-full">
    <template slot="actionsTemplate" data-oj-as="cell">
      <oj-button
        chroming="borderless"
        on-oj-action="[[$parent.editItem.bind($parent, cell.item.data.id)]]">
        Edit
      </oj-button>
      <oj-button
        chroming="borderless"
        on-oj-action="[[$parent.deleteItem.bind($parent, cell.item.data.id)]]">
        Delete
      </oj-button>
    </template>
  </oj-table>

  <oj-dialog id="stockItemDialog" dialog-title="[[dialogTitle]]" cancel-behavior="icon">
    <div slot="body">
      <oj-validation-group id="stockItemFormValidation">
        <oj-form-layout max-columns="2" direction="row">
          <oj-input-text
            id="itemName"
            label-hint="Name"
            value="{{form.name}}"
            required="true">
          </oj-input-text>

          <oj-input-text
            id="itemCategory"
            label-hint="Category"
            value="{{form.category}}"
            required="true">
          </oj-input-text>

          <oj-input-number
            id="itemQuantity"
            label-hint="Quantity"
            value="{{form.quantity}}"
            min="0"
            step="1"
            required="true">
          </oj-input-number>

          <oj-input-number
            id="itemMinimumStock"
            label-hint="Minimum Stock"
            value="{{form.minimumStock}}"
            min="0"
            step="1"
            required="true">
          </oj-input-number>

          <oj-input-text
            id="itemLocation"
            label-hint="Location"
            value="{{form.location}}">
          </oj-input-text>
        </oj-form-layout>
      </oj-validation-group>
    </div>

    <div slot="footer">
      <oj-button id="cancelItemButton" on-oj-action="[[closeItemDialog]]">
        Cancel
      </oj-button>
      <oj-button id="saveItemButton" chroming="callToAction" on-oj-action="[[saveItem]]">
        Save
      </oj-button>
    </div>
  </oj-dialog>
</div>
