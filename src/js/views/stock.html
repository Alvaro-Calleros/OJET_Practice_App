<div class="oj-hybrid-padding stock-page">
  <h1>Stock</h1>

  <div class="stock-primary-actions" aria-label="Stock primary actions">
    <oj-button
      id="stockListAction"
      chroming="outlined"
      data-bind="css: { 'stock-action-active': selectedAction() === 'list' }"
      on-oj-action="[[showList]]">
      List
    </oj-button>
    <oj-button
      id="stockCreateAction"
      chroming="outlined"
      data-bind="css: { 'stock-action-active': selectedAction() === 'create' }"
      on-oj-action="[[showCreate]]">
      Create
    </oj-button>
    <oj-button
      id="stockUpdateAction"
      chroming="outlined"
      data-bind="css: { 'stock-action-active': selectedAction() === 'update' }"
      on-oj-action="[[showUpdate]]">
      Update
    </oj-button>
    <oj-button
      id="stockDeleteAction"
      chroming="outlined"
      data-bind="css: { 'stock-action-active': selectedAction() === 'delete' }"
      on-oj-action="[[showDelete]]">
      Delete
    </oj-button>
  </div>

  <div class="stock-control-row">
    <label for="stockSecondaryAction">Find</label>
    <select
      id="stockSecondaryAction"
      data-bind="options: secondaryActionOptions,
                 optionsText: 'label',
                 optionsValue: 'value',
                 value: secondaryAction,
                 event: { change: selectSecondaryAction }">
    </select>
  </div>

  <div class="stock-message stock-message-success" data-bind="visible: hasStatus, text: statusMessage"></div>
  <div class="stock-message stock-message-error" data-bind="visible: hasError, text: errorMessage"></div>

  <section data-bind="visible: selectedAction() === 'list'">
    <h2>List</h2>
    <p data-bind="visible: items().length === 0">No stock items available.</p>
    <table class="stock-table" data-bind="visible: items().length > 0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Category</th>
          <th>Quantity</th>
          <th>Minimum</th>
          <th>Location</th>
        </tr>
      </thead>
      <tbody data-bind="foreach: items">
        <tr>
          <td data-bind="text: id"></td>
          <td data-bind="text: name"></td>
          <td data-bind="text: category"></td>
          <td data-bind="text: quantity"></td>
          <td data-bind="text: minimumStock"></td>
          <td data-bind="text: location"></td>
        </tr>
      </tbody>
    </table>
  </section>

  <section data-bind="visible: selectedAction() === 'create'">
    <h2>Create</h2>
    <div class="stock-form-grid">
      <label>
        Name
        <input type="text" data-bind="value: createForm.name">
      </label>
      <label>
        Category
        <input type="text" data-bind="value: createForm.category">
      </label>
      <label>
        Quantity
        <input type="number" min="0" step="1" data-bind="value: createForm.quantity">
      </label>
      <label>
        Minimum Stock
        <input type="number" min="0" step="1" data-bind="value: createForm.minimumStock">
      </label>
      <label>
        Location
        <input type="text" data-bind="value: createForm.location">
      </label>
    </div>
    <div class="stock-button-row">
      <button type="button" data-bind="click: createItem">Create Item</button>
      <button type="button" data-bind="click: resetCreateForm">Clear</button>
    </div>
  </section>

  <section data-bind="visible: selectedAction() === 'findById'">
    <h2>Find by ID</h2>
    <div class="stock-search-row">
      <label for="findByIdInput">Item ID</label>
      <input id="findByIdInput" type="text" placeholder="ITM-001" data-bind="value: findByIdQuery">
      <button type="button" data-bind="click: findById">Find</button>
    </div>
    <div data-bind="if: foundByIdItem">
      <div data-bind="template: { name: 'stockItemCardTemplate', data: foundByIdItem() }"></div>
    </div>
  </section>

  <section data-bind="visible: selectedAction() === 'findByName'">
    <h2>Find by Name</h2>
    <div class="stock-search-row">
      <label for="findByNameInput">Item Name</label>
      <input id="findByNameInput" type="text" placeholder="Laptop" data-bind="value: findByNameQuery">
      <button type="button" data-bind="click: findByName">Find</button>
    </div>
    <div data-bind="visible: hasFoundByNameItems">
      <table class="stock-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Minimum</th>
            <th>Location</th>
          </tr>
        </thead>
        <tbody data-bind="foreach: foundByNameItems">
          <tr>
            <td data-bind="text: id"></td>
            <td data-bind="text: name"></td>
            <td data-bind="text: category"></td>
            <td data-bind="text: quantity"></td>
            <td data-bind="text: minimumStock"></td>
            <td data-bind="text: location"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <section data-bind="visible: selectedAction() === 'update'">
    <h2>Update</h2>
    <div class="stock-search-row">
      <label for="updateIdInput">Item ID</label>
      <input id="updateIdInput" type="text" placeholder="ITM-001" data-bind="value: updateIdQuery">
      <button type="button" data-bind="click: loadUpdateItem">Load</button>
    </div>
    <div data-bind="if: updateLoadedItem">
      <p>Editing <strong data-bind="text: updateLoadedItem().id"></strong></p>
      <div class="stock-form-grid">
        <label>
          Name
          <input type="text" data-bind="value: updateForm.name">
        </label>
        <label>
          Category
          <input type="text" data-bind="value: updateForm.category">
        </label>
        <label>
          Quantity
          <input type="number" min="0" step="1" data-bind="value: updateForm.quantity">
        </label>
        <label>
          Minimum Stock
          <input type="number" min="0" step="1" data-bind="value: updateForm.minimumStock">
        </label>
        <label>
          Location
          <input type="text" data-bind="value: updateForm.location">
        </label>
      </div>
      <div class="stock-button-row">
        <button type="button" data-bind="click: updateItem">Update Item</button>
      </div>
    </div>
  </section>

  <section data-bind="visible: selectedAction() === 'delete'">
    <h2>Delete</h2>
    <div class="stock-search-row">
      <label for="deleteIdInput">Item ID</label>
      <input id="deleteIdInput" type="text" placeholder="ITM-001" data-bind="value: deleteIdQuery">
      <button type="button" data-bind="click: loadDeleteItem">Find</button>
    </div>
    <div data-bind="if: deleteCandidate">
      <div data-bind="template: { name: 'stockItemCardTemplate', data: deleteCandidate() }"></div>
      <div class="stock-button-row">
        <button type="button" class="stock-danger-button" data-bind="click: deleteItem">Delete Item</button>
      </div>
    </div>
  </section>

  <script type="text/html" id="stockItemCardTemplate">
    <div class="stock-result">
      <dl>
        <dt>ID</dt>
        <dd data-bind="text: id"></dd>
        <dt>Name</dt>
        <dd data-bind="text: name"></dd>
        <dt>Category</dt>
        <dd data-bind="text: category"></dd>
        <dt>Quantity</dt>
        <dd data-bind="text: quantity"></dd>
        <dt>Minimum Stock</dt>
        <dd data-bind="text: minimumStock"></dd>
        <dt>Location</dt>
        <dd data-bind="text: location"></dd>
      </dl>
    </div>
  </script>
</div>
