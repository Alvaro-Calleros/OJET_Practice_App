<div data-bind="class: rootClass">
    <h2>Units by Category</h2>

    <oj-chart
            class="my-dropdown-with-chart-chart"
            type="[[chartType]]"
            orientation="[[orientationValue]]"
            data="[[unitsByCategoryDataProvider]]"
            animation-on-display="auto"
            animation-on-data-change="auto"
            hover-behavior="dim">
        <template slot="itemTemplate" data-oj-as="item">
            <oj-chart-item
                    value="[[item.data.value]]"
                    group-id="[[ [item.data.group] ]]"
                    series-id="[[item.data.series]]">
            </oj-chart-item>
        </template>
    </oj-chart>
</div>
